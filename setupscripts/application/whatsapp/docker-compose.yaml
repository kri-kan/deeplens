services:
  # =============================================================================
  # WhatsApp Processor - Multi-tenant Messaging Service
  # =============================================================================
  whatsapp-processor:
    build: 
      context: ../../../src/whatsapp-processor
      dockerfile: Dockerfile
    image: deeplens-whatsapp-processor:latest
    container_name: deeplens-whatsapp-${SESSION_ID:-default}-${TENANT_NAME}
    restart: unless-stopped
    environment:
      # Identity & Session
      SESSION_ID: ${SESSION_ID:-default}
      TENANT_NAME: ${TENANT_NAME}
      
      # Database Connection (Targets tenant-specific metadata DB)
      DB_CONNECTION_STRING: postgresql://postgres:${POSTGRES_PASSWORD:-Krikank1%24}@${INFRA_HOST:-192.168.0.170}:${POSTGRES_PORT:-5432}/tenant_${TENANT_NAME}_metadata
      
      # MinIO Connection (Targets shared instance with tenant bucket)
      MINIO_ENDPOINT: ${INFRA_HOST:-192.168.0.170}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-tenant-${TENANT_NAME}-data}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      # Application Configuration
      DATA_DIR: /usr/src/app/data
      API_PORT: 3000
      LOG_LEVEL: info
    
    volumes:
      # Persist Session Authentication & Configuration
      - ../../../data/whatsapp/${TENANT_NAME}/${SESSION_ID:-default}:/usr/src/app/data
    
    networks:
      - deeplens-network
    
    ports:
      # Managed dynamic port mapping
      - "${RequestPort:-3000}:3000"

networks:
  deeplens-network:
    external: true
