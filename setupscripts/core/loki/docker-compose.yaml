services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT}:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - ${LOKI_DATA_PATH}:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - deeplens-network

networks:
  deeplens-network:
    external: true
