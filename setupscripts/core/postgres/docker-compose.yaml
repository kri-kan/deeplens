services:
  postgres:
    image: postgres:18
    container_name: krikanpg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${INFRA_ADMIN_USER}
      POSTGRES_PASSWORD: ${INFRA_ADMIN_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/18/docker
      - ${POSTGRES_BACKUP_PATH}:/backups
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${INFRA_ADMIN_USER}"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - deeplens-network

  # Database Management UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${INFRA_ADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${INFRA_ADMIN_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "${PGADMIN_PORT}:80"
    networks:
      - deeplens-network
    depends_on:
      - postgres

networks:
  deeplens-network:
    external: true
