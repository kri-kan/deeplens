services:
  influxdb:
    image: influxdb:latest
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFRA_ADMIN_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFRA_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=deeplens
      - DOCKER_INFLUXDB_INIT_BUCKET=metrics
    volumes:
      - ${INFLUXDB_DATA_PATH}:/var/lib/influxdb2
    networks:
      - deeplens-network

networks:
  deeplens-network:
    external: true
