services:
  # ---------------------------------------
  # PRODUCTION BROKER
  # ---------------------------------------
  kafka-prod:
    image: apache/kafka:latest
    container_name: kafka-prod
    restart: always
    ports:
      - "${KAFKA_PROD_PORT}:9092"
      - "${KAFKA_PROD_LOCAL_PORT}:29092"
    environment:
      # KRaft settings
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-prod:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=prod-cluster-id-12345
      # Dual Listeners: LOCAL (for host) and INTRANET (for remote machines)
      - KAFKA_LISTENERS=LOCAL://:29092,INTRANET://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=LOCAL://localhost:${KAFKA_PROD_LOCAL_PORT},INTRANET://${INFRA_IP}:${KAFKA_PROD_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,LOCAL:PLAINTEXT,INTRANET:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=LOCAL
      # Performance & Retention
      - KAFKA_HEAP_OPTS=-Xmx4G -Xms4G
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
    volumes:
      - ${KAFKA_DATA_PATH}:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:29092",
        ]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - deeplens-network

  # ---------------------------------------
  # TEST BROKER
  # ---------------------------------------
  kafka-test:
    image: apache/kafka:latest
    container_name: kafka-test
    restart: always
    ports:
      - "${KAFKA_TEST_PORT}:9094"
      - "${KAFKA_TEST_LOCAL_PORT}:29096"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka-test:9095
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=test-cluster-id-67890
      # Dual Listeners: LOCAL (for host) and INTRANET (for remote machines)
      - KAFKA_LISTENERS=LOCAL://:29096,INTRANET://:9094,CONTROLLER://:9095
      - KAFKA_ADVERTISED_LISTENERS=LOCAL://localhost:${KAFKA_TEST_LOCAL_PORT},INTRANET://${INFRA_IP}:${KAFKA_TEST_PORT}
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,LOCAL:PLAINTEXT,INTRANET:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=LOCAL
      # Lower resources for test
      - KAFKA_HEAP_OPTS=-Xmx1G -Xms1G
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - ${KAFKA_TEST_DATA_PATH}:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "/opt/kafka/bin/kafka-broker-api-versions.sh",
          "--bootstrap-server",
          "localhost:29096",
        ]
      interval: 60s
      timeout: 20s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - deeplens-network

  # ---------------------------------------
  # MANAGEMENT UI
  # ---------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=Production
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka-prod:29092
      - KAFKA_CLUSTERS_1_NAME=Test
      - KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS=kafka-test:29096
    depends_on:
      kafka-prod:
        condition: service_started
      kafka-test:
        condition: service_started
    networks:
      - deeplens-network

networks:
  deeplens-network:
    external: true
