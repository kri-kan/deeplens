services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - ./production.yaml:/qdrant/config/production.yaml
      - ${QDRANT_DATA_PATH}:/qdrant/storage
    networks:
      - deeplens-network

networks:
  deeplens-network:
    external: true
