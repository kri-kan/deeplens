worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        # DNS Resolver for Docker internal network
        resolver 127.0.0.11 valid=30s;

        # DeepLens Branding Landing Page
        # This is now the primary entry point. 
        # All dashboards are linked via dynamic port redirection in index.html
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        # Grafana
        location /grafana/ {
            set $grafana_upstream http://grafana:3000/;
            proxy_pass $grafana_upstream;
            proxy_set_header Host $host;
        }

        # MinIO Console
        location /minio/ {
            set $minio_upstream http://minio:9001/;
            proxy_pass $minio_upstream;
            proxy_set_header Host $host;
        }

        # Kafka UI
        location /kafka-ui/ {
            set $kafka_ui_upstream http://kafka-ui:8080/;
            proxy_pass $kafka_ui_upstream;
            proxy_set_header Host $host;
        }

        # InfluxDB
        location /influx/ {
            set $influx_upstream http://influxdb:8086/;
            proxy_pass $influx_upstream;
            proxy_set_header Host $host;
        }

        # Qdrant Dashboard
        location /qdrant/ {
            set $qdrant_upstream http://qdrant:6333/;
            proxy_pass $qdrant_upstream;
            proxy_set_header Host $host;
        }

        # pgAdmin Web UI
        location /pgadmin/ {
            set $pgadmin_upstream http://pgadmin:80/;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_pass $pgadmin_upstream;
            proxy_redirect off;
        }

        # Jaeger UI
        location /jaeger/ {
            set $jaeger_upstream http://jaeger:16686/;
            proxy_pass $jaeger_upstream;
            proxy_set_header Host $host;
        }

        # Prometheus UI
        location /prometheus/ {
            set $prometheus_upstream http://prometheus:9090/;
            proxy_pass $prometheus_upstream;
            proxy_set_header Host $host;
        }

        # Open WebUI (Ollama)
        location /chat/ {
            set $open_webui_upstream http://open-webui:8080/;
            proxy_pass $open_webui_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check for the gateway itself
        location /health {
            return 200 'OK';
        }
    }
}
