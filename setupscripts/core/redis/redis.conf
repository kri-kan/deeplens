# =============================================================================
# DeepLens Redis Configuration
# Optimized for performance, durability, and standard security
# =============================================================================
 
# -----------------------------------------------------------------------------
# Network & Security
# -----------------------------------------------------------------------------
bind 0.0.0.0
port 6379
protected-mode no
timeout 300
tcp-keepalive 300
tcp-backlog 511
 
# Standard Infrastructure Password
requirepass Krikank1$
 
# -----------------------------------------------------------------------------
# Memory Management
# -----------------------------------------------------------------------------
# Set to the requested 2GB limit
maxmemory 2gb
maxmemory-policy allkeys-lru
 
# Memory usage optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
 
# -----------------------------------------------------------------------------
# Persistence Configuration (Hybrid RDB + AOF)
# -----------------------------------------------------------------------------
# RDB Snapshots
save 900 1
save 300 10
save 60 10000
 
# RDB file settings
rdbcompression yes
rdbchecksum yes
dbfilename deeplens-dump.rdb
dir /data
 
# AOF (Append Only File) - for high durability
appendonly yes
appendfilename "deeplens-appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
 
# -----------------------------------------------------------------------------
# Database Settings & Allocation
# -----------------------------------------------------------------------------
databases 16
 
# DeepLens Database Roles:
# DB 0: Session cache (Identity Service)
# DB 1: API response cache
# DB 2: Vector search results cache
# DB 3: Image processing queue
# DB 4: User preferences cache
# DB 5: System metrics cache
# DB 6-15: Reserved for future use
 
# Key expiration optimization (lazy-expire and lazy-del are NOT valid directives)
# Use lazyfree-lazy-expire / lazyfree-lazy-server-del instead
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
 
# -----------------------------------------------------------------------------
# Performance & Logging
# -----------------------------------------------------------------------------
maxclients 10000
loglevel notice
logfile /data/redis.log
 
# Slow query logging
slowlog-log-slower-than 10000
slowlog-max-len 128
 
# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
 
# Stream settings
stream-node-max-bytes 4096
stream-node-max-entries 100
