services:
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf
      - ${REDIS_DATA_PATH}:/data
    networks:
      - deeplens-network
 
networks:
  deeplens-network:
    external: true
