apiVersion: 1

datasources:
  # ---------------------------------------------------------
  # METRICS (Prometheus)
  # ---------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      manageAlerts: true

  # ---------------------------------------------------------
  # LOGS (Loki)
  # ---------------------------------------------------------
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # Link Logs to Traces: Detect TraceID and link to Jaeger
      derivedFields:
        - datasourceUid: jaeger
          matcherRegex: "(?:traceID|trace_id|traceid)=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"

  # ---------------------------------------------------------
  # TRACES (Jaeger)
  # ---------------------------------------------------------
  - name: Jaeger
    type: jaeger
    uid: jaeger # Explicitly set UID to match Loki's correlation above
    access: proxy
    url: http://jaeger:16686
    jsonData:
      # Link Traces back to Logs: Link span to Loki
      tracesToLogs:
        datasourceUid: Loki
        tags: ["service.name"]
        mapTagNamesEnabled: false
        spanStartTimeShift: "1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
      nodeGraph:
        enabled: true
      serviceMap:
        datasourceUid: Prometheus
